# rm-ocr — containerized poller that transcribes reMarkable PDFs found in a
# watched directory. The reference source is Scrybble syncing into an Obsidian
# vault, but any tool that drops reMarkable PDFs on disk works (rmapi, desktop
# export, synced folder, manual copy) — point the vault mount at wherever they land.
#
# Joins the same Docker network as Ollama and reaches it at http://ollama:11434.
# The vault is mounted FULLY READ-ONLY. Transcripts go to an independent output
# volume (OUT_DIR), and state (manifest + logs) to another — both outside the
# vault. Because nothing is ever written back into the vault, there is no way to
# touch the source files and no scan feedback loop.
#
# Create the two host dirs before first run:
#   mkdir -p /mnt/docker/rm-ocr/out /mnt/docker/rm-ocr/state
#
# Want Obsidian to index the transcripts? Point the OUT_DIR host path at a folder
# INSIDE the vault instead, e.g.:
#   - "/mnt/docker/obsidian/config/Obsidian Vault/_transcripts:/out"
# (that one folder is then the only writable path; the rest of the vault stays ro.)

services:
  rm-ocr:
    # Pull the prebuilt multi-arch image from GHCR (published by CI on push to
    # main / version tags). To build locally instead, comment `image:` out and
    # uncomment `build: .` below.
    image: ghcr.io/delize/remarkable-ocr-handwriting:latest
    # build: .
    container_name: rm-ocr
    restart: unless-stopped
    env_file: .env
    environment:
      VAULT_DIR: /vault
      SOURCE_SUBDIR: remarkable
      OUT_DIR: /out                 # output base — its own volume (see below)
      OUT_SUFFIX: -handwriting_converted   # Sample.pdf -> Sample-handwriting_converted.md
      # OUT_ALONGSIDE: "1"          # write next to each source PDF instead (needs the vault mounted :rw)
      STATE_DIR: /state
      MODEL: qwen3.5:9b
      OLLAMA_HOST: http://ollama:11434
      THREADS: "14"
      NO_THINK: "1"
      DPI: "150"
      MAX_PX: "1568"
      TIMEOUT: "1800"
      MODEL_WAIT_TIMEOUT: "1800"    # block at startup until the model is loadable on OLLAMA_HOST (0 = disable)
      INTERVAL: "600"
      INOTIFY: "1"                  # wake immediately on inotify events (Linux only; falls back to pure poll)
      HASH_CHECK: "1"
      MAX_AGE_HOURS: "24"           # only transcribe PDFs touched in the last 24h (0 = no limit, e.g. backfill an existing vault — equivalent to the standalone splitter's PROCESS_EXISTING=true)
      MAX_RETRIES: "3"
      # MIN_REPROCESS_INTERVAL: "0" # optional cooldown (s) vs. non-deterministic re-renders

      # --- tall-page splitter (vendored from remarkable-pdf-splitter) ---
      # rm-ocr now splits tall reMarkable exports in place, then OCRs in the same
      # pass — no second container needed. These knobs mirror the standalone
      # splitter's MIN_ASPECT_RATIO / TARGET_PAGE_HEIGHT / MIN_GAP_HEIGHT /
      # WHITESPACE_THRESHOLD; the standalone WATCH_MODE is covered by INOTIFY
      # above, PROCESS_EXISTING by MAX_AGE_HOURS=0, and DELETE_ORIGINAL is N/A
      # (we always rewrite atomically — `os.replace` in rm_split.py).
      #
      # To turn it on: uncomment AUTO_SPLIT and drop the ":ro" from the vault
      # mount below — splitting writes in place, so the source dir must be :rw.
      # AUTO_SPLIT: "1"
      # SPLIT_MAX_ASPECT: "2.0"               # was MIN_ASPECT_RATIO
      # SPLIT_TARGET_PAGE_HEIGHT: "700"       # was TARGET_PAGE_HEIGHT (px @ 72dpi)
      # SPLIT_MIN_GAP_HEIGHT: "25"            # was MIN_GAP_HEIGHT
      # SPLIT_WHITESPACE_THRESHOLD: "248"     # was WHITESPACE_THRESHOLD
      # SPLIT_MARKER_KEY: "/RemarkableSplitter"
      # SPLIT_MARKER_VALUE: "processed"
      #
      # Alternative — REQUIRE_SPLIT: keep the splitter running as its own
      # container and have rm-ocr just *wait* for split-ready PDFs. Off by
      # default; do not enable together with AUTO_SPLIT.
      # REQUIRE_SPLIT: "1"
    volumes:
      # READ-ONLY: the whole vault. Nothing is ever written here.
      # For OUT_ALONGSIDE mode (transcripts next to source PDFs), drop the ":ro".
      - "/mnt/docker/obsidian/config/Obsidian Vault:/vault:ro"
      # READ-WRITE: transcripts output base (configurable mount).
      - "/mnt/docker/rm-ocr/out:/out"
      # READ-WRITE: manifest + logs (the idempotency state — MUST persist).
      - "/mnt/docker/rm-ocr/state:/state"
    # CPU-only inference pegs the box; be polite to Plex/other containers.
    # (Hard cap optional — Ollama itself does the heavy lifting; this is the poller.)
    networks: [ai]

networks:
  ai:
    external: true   # the user-defined network ollama is attached to
