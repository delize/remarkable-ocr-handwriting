version: 2
updates:
  # Keep the GitHub Actions used in workflows current — grouped into one PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Base image — grouped into one PR.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]

  # Pinned pip deps — grouped into one PR.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      pip:
        patterns: ["*"]
