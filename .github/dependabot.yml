version: 2
updates:
  # Keep the GitHub Actions used in workflows current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Keep the base image / pinned pip deps current.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
