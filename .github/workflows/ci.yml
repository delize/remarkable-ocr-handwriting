name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  selftest:
    name: Self-test (offline, no deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # selftest.py stubs pdf2image + Ollama, so it needs no third-party deps.
      - name: Run self-test
        run: python3 selftest.py

      # Byte-compile both modules to catch syntax errors the self-test doesn't import.
      - name: Compile-check modules
        run: python3 -m py_compile rm_ocr.py ocr_daemon.py selftest.py

  docker-build:
    name: Build image (no push) + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Build the real image for the host arch and load it locally (no registry
      # push). This is what actually catches a broken base-image bump or a
      # pdf2image/poppler install failure on a Dependabot PR.
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: rm-ocr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test: the entrypoint imports rm_ocr (=> pdf2image/Pillow) and runs
      # --status, which needs no Ollama, no vault, no PDFs. Proves the image works.
      - name: Smoke test (--status)
        run: docker run --rm -e STATE_DIR=/tmp/state rm-ocr:ci --status
