name: CI

# The single source of truth for build/test/publish. Job graph:
#
#   lint  ─┐
#   selftest ─┼─► docker-build ─► publish (main / vX.Y.Z only)
#   security ─┘                    │
#                                  └─ Trivy gate, SBOM + provenance on the multi-arch push
#
# Cheap checks gate the expensive ones — a typo never burns a 90s image build,
# a leaked secret never produces a pushed image. CodeQL stays in its own file
# (weekly schedule + GitHub's "Code Scanning" UI looks for the dedicated workflow).

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -----------------------------------------------------------------
  # Fast parallel checks — no dependencies between them.
  # -----------------------------------------------------------------

  lint:
    name: Lint (${{ matrix.tool }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # all three linters report — fix everything in one pass
      matrix:
        tool: [ruff, hadolint, actionlint]
    steps:
      - uses: actions/checkout@v7

      - if: matrix.tool == 'ruff'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - if: matrix.tool == 'ruff'
        name: ruff (Python lint)
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github ."

      # DL3008/DL3013 (unpinned apt/pip versions) are intentionally ignored —
      # homelab tool, pinning every transitive system package is more noise
      # than signal here.
      - if: matrix.tool == 'hadolint'
        name: hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013
          failure-threshold: warning

      - if: matrix.tool == 'actionlint'
        name: actionlint (workflow lint)
        uses: raven-actions/actionlint@v2

  selftest:
    name: Self-test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # if 3.12 fails and 3.14 passes, we want to know both
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # selftest.py stubs pdf2image + Ollama + the renderer, so it needs no
      # third-party deps. 3.14 is what the production image ships with; 3.12
      # and 3.13 catch syntax regressions for anyone running outside Docker.
      - name: Run self-test
        run: python3 selftest.py

      # Glob (./*.py guards against filenames starting with -).
      - name: Compile-check modules
        run: python3 -m py_compile ./*.py

  security:
    name: Security (secrets + dep audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # gitleaks needs full history to scan past commits

      # Fails the build on any finding. A secret in history is a real
      # exposure even after deletion; we want this hard-stopped.
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Fails on any finding. Dependabot bumps pip deps weekly, so a finding
      # is actionable (bump, pin away, or document in .pip-audit-ignore).
      - name: pip-audit (dep CVEs)
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt
          require-hashes: false

  # -----------------------------------------------------------------
  # Expensive: only runs if every fast check passes.
  # -----------------------------------------------------------------

  docker-build:
    name: Build image + smoke + Trivy
    needs: [lint, selftest, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Trivy SARIF upload
      actions: read           # codeql-action/upload-sarif reads run metadata
    outputs:
      # Tag the locally-built scan image with the run SHA so the publish job
      # can re-tag rather than rebuild.
      image-tag: rm-ocr:scan
    steps:
      - uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Build the real image for the host arch and load it locally. The
      # publish job's multi-arch build reuses these layers from the GHA cache.
      - name: Build image (local, for scan + smoke)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: rm-ocr:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Prove every runtime import — rmc is invoked as a subprocess so
      # import-time silence is what bit us in v0.3.1.
      - name: Smoke test (imports)
        run: docker run --rm --entrypoint python3 rm-ocr:scan -c "import rmc, rm_render, rm_split, rm_ocr, ocr_daemon"

      # --status needs no Ollama, no vault, no PDFs. Proves the image boots.
      - name: Smoke test (--status)
        run: docker run --rm -e STATE_DIR=/tmp/state rm-ocr:scan --status

      # Full severity for the Security tab; MEDIUM included for visibility
      # but NOT gated below.
      - name: Trivy (SARIF for Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: rm-ocr:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: '0'

      # SARIF upload requires GitHub code-scanning, which is free on public
      # repos but requires GitHub Advanced Security on private ones. Tolerate
      # failure so the gate below still runs on private repos; once the repo
      # is public this step succeeds automatically with no change.
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      # Gate: fail the build on CRITICAL/HIGH FIXABLE CVEs only. ignore-unfixed
      # skips CVEs upstream hasn't patched yet (no action we can take).
      - name: Trivy (gate on CRITICAL/HIGH fixable CVEs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: rm-ocr:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  # -----------------------------------------------------------------
  # Publish: only on push to main or vX.Y.Z tag. Never on PRs.
  # Runs only if docker-build (and all its needs) passed.
  # -----------------------------------------------------------------

  publish:
    name: Publish to GHCR (multi-arch, SBOM + provenance)
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to GHCR
      security-events: write   # post-publish Trivy SARIF
      actions: read            # codeql-action/upload-sarif reads run metadata
      id-token: write          # SLSA provenance attestation
      attestations: write      # build provenance attestation
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Multi-arch push. amd64 layers come from the GHA cache populated by
      # docker-build above (effectively free); only arm64 builds fresh.
      # SBOM + SLSA provenance attestations attach to the image manifest in
      # GHCR — inspect via `docker buildx imagetools inspect <image>`.
      - name: Build and push (multi-arch, SBOM + provenance)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
