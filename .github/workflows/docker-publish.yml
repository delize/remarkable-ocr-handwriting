name: Build and publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
    # Only rebuild when something that affects the image changes.
    paths:
      - "rm_ocr.py"
      - "rm_split.py"
      - "rm_render.py"
      - "ocr_daemon.py"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ghcr.io/delize/remarkable-ocr-handwriting

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR
      security-events: write   # required to upload Trivy SARIF to the Security tab
      id-token: write          # required for SLSA provenance attestation
      attestations: write      # required for build provenance attestation
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Build once locally (amd64 only — local-load can't do multi-arch) so we
      # can Trivy-scan the actual artifact BEFORE pushing. The subsequent
      # multi-arch push step reuses this layer cache, so the amd64 half is
      # essentially free; only arm64 builds fresh.
      - name: Build (local, for scan)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: rm-ocr:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy gate: refuse to publish an image with CRITICAL/HIGH fixable
      # CVEs. Same threshold as CI's docker-build job — keeps PR-time gates
      # and publish-time gates consistent so nothing slips through.
      - name: Trivy (publish gate)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: rm-ocr:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # Same scan, full severity + SARIF, for the Security tab. Runs even if
      # the gate above failed so we never lose visibility on findings.
      - name: Trivy (SARIF for Security tab)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: rm-ocr:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-publish

      # Multi-arch push. SBOM + provenance attestations get attached to the
      # image manifest in GHCR (visible via `docker buildx imagetools inspect`)
      # — SLSA provenance proves which workflow + commit produced the image,
      # SBOM lets downstream tooling enumerate every package without scanning.
      - name: Build and push (multi-arch, SBOM + provenance)
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          # The NAS is x86-64; arm64 added so it also runs on Apple Silicon / Pi.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
